<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>履歴</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
    /* タブの下線を濃くする */
    .nav-tabs .nav-link.active {
        border-bottom: 3px solid #000 !important; 
        font-weight: bold;
    }

    /* 非アクティブのタブ */
    .nav-tabs .nav-link {
        border-bottom: 2px solid #888;
    }
    /* アクティブなタブ（選択中） */
    .nav-tabs .nav-link.active {
        background-color: #007bff !important; /* 青 */
        color: white !important;
        border-color: #007bff #007bff #fff !important;
        font-weight: bold;
    }
    /* 非アクティブなタブ */
    .nav-tabs .nav-link {
        background-color: #e9ecef; /* 薄いグレー */
        color: #333;
        border: 1px solid #ccc;
    }
    /* ホバー時 */
    .nav-tabs .nav-link:hover {
        background-color: #d6d6d6;
        color: #000;
    }
    /* テーブル全体の枠線を濃くする */
    table, th, td {
        border: 1px solid #000;
    }

    /* ヘッダーを少し強調 */
    th {
        background-color: #f2f2f2;
        font-weight: bold;
    }


    </style>
</head>

<body class="p-4">

<h2>入出庫履歴</h2>

<!-- タブ部分 -->
<ul class="nav nav-tabs" id="historyTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="in-tab" data-bs-toggle="tab"
                data-bs-target="#in" type="button" role="tab">
            入庫履歴
        </button>
    </li>

    <li class="nav-item" role="presentation">
        <button class="nav-link" id="out-tab" data-bs-toggle="tab"
                data-bs-target="#out" type="button" role="tab">
            出庫履歴
        </button>
    </li>
</ul>

<!-- タブの中身 -->
<div class="tab-content mt-3">

    <!-- 入庫履歴 -->
    <div class="tab-pane fade show active" id="in" role="tabpanel">
        <table class="table table-bordered">
            <tr>
                <th>ID</th>
                <th>商品名</th>
                <th>数量</th>
                <th>日時</th>
            </tr>
            <tr th:each="h : ${inHistory}">
                <td th:text="${h.id}"></td>
                <td th:text="${h.product.name}"></td>
                <td th:text="${h.quantity}"></td>
                <td th:text="${#temporals.format(h.dateTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            </tr>
        </table>
    </div>

    <!-- 出庫履歴 -->
    <div class="tab-pane fade" id="out" role="tabpanel">
        <table class="table table-bordered">
            <tr>
                <th>ID</th>
                <th>商品名</th>
                <th>数量</th>
                <th>日時</th>
            </tr>
            <tr th:each="h : ${outHistory}">
                <td th:text="${h.id}"></td>
                <td th:text="${h.product.name}"></td>
                <td th:text="${h.quantity}"></td>
                <td th:text="${#temporals.format(h.dateTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
            </tr>
        </table>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

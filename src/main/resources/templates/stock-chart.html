<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>在庫推移グラフ</title>

    <!--Vue.js CDN-->
    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>

    <!--Echarts-->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <!--CSS-->
    <style>
        body {
            margin: 20px;
            font-family: sans-serif;
        }

        #app {
            max-width: 800px;
            margin: auto;
        }

        select {
            padding: 6px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div id="app">
        <h2>在庫推移グラフ</h2>

        <!--商品選択-->
        <select v-model="productId" @change="loadData()">
            <option disabled value="">選択してください</option>
            <option v-for="p in products" :value="Number(p.id)">
                {{ p.name }}
            </option>
        </select>

        <!--グラフ描画領域-->
        <div id="chart" style="width: 100%; height: 400px; margin-top: 20px;"></div>

        <button @click="toggleChart">切り替え</button>

        <a href="/stock-in-out" class="btn btn-secondary mt-3">入出庫推移グラフ</a>
    </div>

    <!--Vue.js　ロジック-->
    <script src="/js/stock-chart.js"></script>
</body>

</html>

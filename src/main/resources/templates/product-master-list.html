<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品マスタ一覧</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h2 class="mb-3">商品マスタ一覧</h2>

<a href="/products/masters" class="btn btn-success mb-3">＋新規商品登録</a>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>取引先</th>
        <th>商品名</th>
        <th>単位</th>
        <th>カテゴリ</th>
        <th>原価</th>
        <th>売価</th>
        <th>操作</th>
    </tr>

    <tr th:each="p : ${products}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.maker != null ? p.maker.name : ''}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.unit}"></td>
        <td th:text="${p.category}"></td>
        <td th:text="${p.costPrice}"></td>
        <td th:text="${p.salePrice}"></td>

        <td>
            <a th:href="@{'/products/master/edit/' + ${p.id}}" class="btn btn-primary btn-sm">編集</a>
            <a th:href="@{'/products/master/delete/' + ${p.id}}" class="btn btn-danger btn-sm"
               onclick="return confirm('削除しますか？');">削除</a>
        </td>
    </tr>
</table>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録</title>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<div id="app" class="container" style="max-width: 500px;">
    <h2 class="mb-3">ユーザー登録</h2>

    <!-- エラーメッセージ -->
    <div v-if="errorMessage" class="alert alert-danger">
        {{ errorMessage }}
    </div>

    <!-- 成功メッセージ -->
    <div v-if="successMessage" class="alert alert-success">
        {{ successMessage }}
    </div>

    <div class="mb-3">
        <label class="form-label">ユーザー名</label>
        <input type="text" class="form-control" v-model="username">
    </div>

    <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" class="form-control" v-model="password">
    </div>

    <div class="mb-3">
        <label class="form-label">パスワード（確認）</label>
        <input type="password" class="form-control" v-model="passwordConfirm">
    </div>

    <div class="mb-3">
        <label class="form-label">権限</label>
        <select class="form-select" v-model="role">
            <option value="ADMIN">ADMIN</option>
            <option value="USER">USER</option>
        </select>
    </div>

    <button class="btn btn-primary" @click="registerUser">登録</button>
</div>

<script src="/js/user-new.js"></script>
</body>
</html>

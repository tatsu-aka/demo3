<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>取引先一覧</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

    <h2>取引先一覧</h2>

    <!-- 新規登録フォーム -->
    <form th:action="@{/makers/add}" method="post" class="mb-4">
        <div class="row g-2">
            <div class="col-auto">
                <input type="text" name="name" class="form-control" placeholder="取引先名" required>
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-success">＋追加</button>
            </div>
        </div>
    </form>

    <!-- 一覧テーブル -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>取引先名</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${makers}">
                <td th:text="${m.id}"></td>
                <td th:text="${m.name}"></td>
                <td>
                    <a th:href="@{'/makers/delete/' + ${m.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('削除しますか？');">
                        削除
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <a href="/product" class="btn btn-secondary mt-3">← 商品一覧へ戻る</a>

</body>
</html>

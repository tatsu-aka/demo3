<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>ログイン</title>

    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            padding: 40px;
        }

        .login-box {
            width: 320px;
            margin: 0 auto;
            padding: 24px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 12px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        .error {
            color: red;
            margin-bottom: 12px;
        }
    </style>

    <!--Vue読み込み-->
    <script src="http://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

    <div id="app" class="login-box">
        <h2>ログイン</h2>

        <!--ログイン失敗-->
        <p class="error" th:if="${param.error}">
            ユーザー名またはパスワードが違います
        </p>

        <!--Vueバリデーションエラー-->
        <p class="error" v-if="errorMessage">{{ errorMessage }}</p>

        <form method="post" action="/login" @submit="validateForm">
            <label>ユーザー名</label>
            <input type="text" name="username" v-model="username">

            <label>パスワード</label>
            <input type="password" name="password" v-model="password">

            <button type="submit">ログイン</button>
        </form>
    </div>

    <script src="/js/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>在庫一覧</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #0078d4;
            color: white;
        }

        tr:hover {
            background: #f1f7ff;
        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <h2>在庫一覧</h2>

        <table>
            <thead>
                <tr>
                    <th>商品名</th>
                    <th>在庫数</th>
                    <th>内訳</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="s in stocks" :key="s.productName">
                    <td>{{ s.productName }}</td>
                    <td>{{ s.stock }}</td>
                    <td>
                        <button @click="showDetail(s.productName)">内訳</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <p style="margin-top:20px;">
            <a href="/product">商品一覧へ戻る</a>
        </p>


        <!-- 内訳モーダル -->
        <div v-if="showModal" class="modal-overlay">
            <div class="modal">
                <h3>取引先別 内訳</h3>

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>取引先</th>
                            <th>在庫数</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="d in detail" :key="d.maker">
                            <td>{{ d.maker }}</td>
                            <td>{{ d.stock }}</td>
                        </tr>
                    </tbody>
                </table>

                <button @click="showModal = false">閉じる</button>
            </div>
        </div>

        <style>
            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.4);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            }

            .modal {
                background: white;
                padding: 20px;
                border-radius: 10px;
                width: 400px;
            }
        </style>
    </div>

    <!-- Vue & Axios -->
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/stock-list.js"></script>

</body>

</html>

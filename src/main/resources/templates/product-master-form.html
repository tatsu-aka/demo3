<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品マスタ登録</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h2>商品マスタ登録</h2>

<form th:action="@{/products/master/save}" method="post" th:object="${product}">
    <input type="hidden" th:field="*{id}">

    <div class="mb-2">
        <label>商品名</label>
        <input type="text" th:field="*{name}" class="form-control" required>
    </div>

    <div class="mb-2">
        <label>取引先</label>
        <select th:field="*{maker.id}" class="form-select">
            <option th:each="m : ${makers}" th:value="${m.id}" th:text="${m.name}"></option>
        </select>
    </div>

    <div class="mb-2">
        <label>単位</label>
        <input type="text" th:field="*{unit}" class="form-control">
    </div>

    <div class="mb-2">
        <label>カテゴリ</label>
        <input type="text" th:field="*{category}" class="form-control">
    </div>

    <div class="mb-2">
        <label>原価</label>
        <input type="number" th:field="*{costPrice}" class="form-control">
    </div>

    <div class="mb-2">
        <label>売価</label>
        <input type="number" th:field="*{salePrice}" class="form-control">
    </div>

    <button class="btn btn-primary mt-2">保存</button>
</form>

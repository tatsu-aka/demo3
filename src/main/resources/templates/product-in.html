<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入庫</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #005ea2;
        }

        .info {
            margin-bottom: 20px;
            padding: 12px;
            background: #eef5ff;
            border-left: 4px colid #0078d4;
            border-radius: 6px;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>入庫</h2>

        <form th:action="@{/product/in}" method="post">
            <!-- 商品 -->
            <div class="mb-3">
                <label class="form-label">商品</label>
                <!--商品選択-->
                <select name="productId" class="form-select mb-2" onchange="updateInfo(this)">
                    <option value="">選択してください</option>
                    <option th:each="p : ${products}" th:value="${p.id}" th:data-category="${p.category}"
                        th;data-unit="${p.unit}" th:data-maker="${p.maker.name}" th:text="${p.name}">
                    </option>
                </select>
            </div>

            <!--カテゴリ-->
            <div class="mb-3">
                <label class="form-label">カテゴリ</label>
                <select name="category" class="form-select">
                    <option value="">選択してください</option>
                    <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
                </select>
            </div>

            <!--単位-->
            <div class="mb-3">
                <label class="form-label">単位</label>
                <select name="unit" class="form-select">
                    <option value="">選択してください</option>
                    <option th:each="u : ${units}" th:value="${u}" th:text="${u}"></option>
                </select>
            </div>

            <!--取引先-->
            <div class="mb-3">
                <label class="form-label">取引先</label>
                <select name="makerId" class="form-select mb-2">
                    <option value="">選択してください</option>
                    <option th:each="m : ${makers}" th:value="${m.id}" th:text="${m.name}"></option>
                </select>
            </div>

            <!--数量-->
            <div class="mb-3">
                <label class="form-label">入庫数量</label>
                <input type="number" name="quantity" min="1" required class="form-control">
            </div>

            <button type="submit" class="btn btn-primary">入庫する</button>
        </form>
        <p class="mt-3">
            <a th:href="@{/product}">商品一覧へ戻る</a>
        </p>
    </div>

    <script>
        function updateInfo(sel) {
            const opt = sel.options[sel.selectedIndex];
            document.getElementById("category").textContent = opt.dataset.category || "";
            document.getElementById("makerInput").textContent = opt.dataset.maker || "";
            document.getElementById("unitInput").textContent = opt.dataset.unit || "";
        }
    </script>
</body>

</html>

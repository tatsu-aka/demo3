<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>入庫</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #005ea2;
        }

        .info {
            margin-bottom: 20px;
            padding: 12px;
            background: #eef5ff;
            border-left: 4px colid #0078d4;
            border-radius: 6px;
            color: #333;
        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <h2>入庫</h2>

        <!-- 商品 -->
        <div class="mb-3">
            <label class="form-label">商品</label>
            <!--商品選択-->
            <select v-model="productId" class="form-select mb-2">
                <option value="">選択してください</option>
                <option v-for="p in products" :key="p.id" :value="p.id">{{ p.name }}</option>
            </select>
        </div>

        <!--カテゴリ-->
        <div class="mb-3">
            <label class="form-label">カテゴリ</label>
            <select v-model="category" class="form-select">
                <option value="">選択してください</option>
                <option v-for="c in categories" :key="c" :value="c">{{ c }}</option>
            </select>
        </div>

        <!--単位-->
        <div class="mb-3">
            <label class="form-label">単位</label>
            <select v-model="unit" class="form-select">
                <option value="">選択してください</option>
                <option v-for="u in units" :key="u" :value="u">{{ u }}</option>
            </select>
        </div>

        <!--取引先-->
        <div class="mb-3">
            <label class="form-label">取引先</label>
            <select v-model="makerId" class="form-select mb-2">
                <option value="">選択してください</option>
                <option v-for="m in makers" :key="m.id" :value="m.id">{{ m.name }}</option>
            </select>
        </div>

        <!--数量-->
        <div class="mb-3">
            <label class="form-label">入庫数量</label>
            <input type="number" v-model="quantity" min="1" required class="form-control">
        </div>

        <button class="btn btn-primary" @click="submit">入庫する</button>

        <!--エラー表示-->
        <div v-if="errors.length" class="alert alert-danger mt-3">
            <ul>
                <li v-for="e in errors" :key="e">{{ e }}</li>
            </ul>
        </div>

        <div v-if="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>

        <p class="mt-3">
            <a href="/product">商品一覧へ戻る</a>
        </p>
    </div>
    <script src="https://unpkg.com/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const app = {
            data() {
                return {
                    products: [],
                    categories: [],
                    units: [],
                    makers: [],
                    productId: "",
                    category: "",
                    unit: "",
                    makerId: "",
                    quantity: "",
                    errors: [],
                    successMessage: ""
                };
            },

            mounted() {
                axios.get("/api/products").then(res => this.products = res.data);
                axios.get("/api/master/categories").then(res => this.categories = res.data);
                axios.get("/api/master/units").then(res => this.units = res.data);
                axios.get("/api/master/makers").then(res => this.makers = res.data);
            },

            methods: {
                submit() {
                    this.errors = [];
                    this.successMessage = "";

                    axios.post("/api/stock/in", {
                        productId: this.productId,
                        quantity: this.quantity,
                        makerId: this.makerId,
                        unit: this.unit,
                        category: this.category
                    })
                        .then(() => {
                            this.successMessage = "入庫が完了しました";
                            this.clearFrom();
                        })
                        .catch(err => {
                            if (err.response && err.response.data) {
                                this.errors = err.response.data;
                            } else {
                                this.errors = ["通信エラーが発生しました"];
                            }
                        });
                },
                clearFrom() {
                    this.productId = "";
                    this.quantity = "";
                    this.makerId = "";
                    this.unit = "";
                    this.category = "";
                }
            }
        };
        Vue.createApp(app).mount("#app");
    </script>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>入庫</title>
    <style>
         body {
            font-family: "Segoe UI", sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 450px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 1);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #005ea2;
        }

        .info {
            margin-bottom: 20px;
            padding: 12px;
            background: #eef5ff;
            border-left: 4px colid #0078d4;
            border-radius: 6px;
            color: #333;
        }
    </style>
</head> 
<body>
<div class="container">
    <h2>入庫</h2>
    
    <form th:action="@{/products/in}" method="post">
        <!-- 商品 -->
        <div class="mb-3">
            <label class="form-label">商品</label>
            <!--既存商品選択-->
            <select name="productId" class="form-select mb-2" onchange="updateInfo(this)">
                <option value="">選択してください</option>
                <option th:each="p : ${products}"
                        th:value="${p.id}"
                        th:data-maker="${p.maker}"
                        th:data-unit="${p.unit}"
                        th:data-category="${p.category}"
                        th:text="${p.name}">
                </option>
            </select>
              新規商品入力
            <input type="text" name="newProductName" class="form-control mt-2" placeholder="新しい商品名を入力">
        </div>

        <!--取引先-->
        <div class="mb-3">
            <label class="form-label">取引先</label>

            <!--既存取引先-->
            <select id="makerSelect" class="form-select mb-2" onchange="toggleMakerInput()">
                <option value="">選択してください</option>
                <option th:each="m : ${makers}" th:value="${m}" th:text="${m}"></option>
                <option value="その他">その他（自由入力）</option>
            </select>
            <!--新規取引先-->
            <input type="text" id="makerInput" name="maker" class="form-control" placeholder="新しい取引先を入力" style="display: none;">
        </div>

        <button type="submit" class="btn btn-primary">入庫する</button>
    </form>
</div>


<p>
    <a th:href="@{/products}">商品一覧へ戻る</a>
</p>
</div>
<script>
    function updateInfo(sel) {
        const opt = sel.options[sel.selectedIndex];
        document.getElementById("category").textContent = opt.dataset.category || "";
        document.getElementById("makerInput").textContent = opt.dataset.maker || "";
        document.getElementById("unitInput").textContent = opt.dataset.unit || "";
    }
</script>
</body> 
</html>

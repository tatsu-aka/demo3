<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品編集</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h2>商品編集</h2>

<form th:action="@{'/products/edit/' + ${product.id}}" method="post">

    <div class="mb-3">
        <label class="form-label">商品名</label>
        <input type="text" class="form-control" th:value="${product.name}" name="name">
    </div>

    <div class="mb-3">
        <label class="form-label">在庫</label>
        <input type="number" class="form-control" th:value="${product.stock}" name="stock">
    </div>

    <div class="mb-3">
        <label class="form-label">原価</label>
        <input type="number" class="form-control" th:value="${product.costPrice}" name="costPrice">
    </div>

    <div class="mb-3">
        <label class="form-label">売価</label>
        <input type="number" class="form-control" th:value="${product.salePrice}" name="salePrice">
    </div>

    <button type="submit" class="btn btn-primary">更新</button>
    <a href="/products" class="btn btn-secondary">戻る</a>

</form>

</body>
</html>

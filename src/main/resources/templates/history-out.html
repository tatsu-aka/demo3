<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>出庫履歴</title>
</head>
<body>

<h1>出庫履歴</h1>
<form th:action="@{/history/out}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="商品名で検索">
    <button type="submit">検索</button>
</form>

<div>
    <a th:href="@{/history/out(sort='dateDesc', keyword=${keyword})}">日付が新しい順</a>
    <a th:href="@{/history/out(sort='dateAsc', keyword=${keyword})}">日付が古い順</a>
    <a th:href="@{/history/out(sort='qtyDesc', keyword=${keyword})}">数量が多い順</a>
    <a th:href="@{/history/out(sort='qtyAsc', keyword=${keyword})}">数量が少ない順</a>
</div>

<table border="1">
    <tr>
        <th>ID</th>
        <th>商品ID</th>
        <th>数量</th>
        <th>日時</th>
    </tr>

    <tr th:each="h : ${history}">
        <td th:text="${h.id}"></td>
        <td th:text="${h.product.name}"></td>
        <td th:text="${h.quantity}"></td>
        <td th:text="${#temporals.format(h.dateTime, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
</table>

<a href="/products">商品一覧へ戻る</a>

</body>    
</html>

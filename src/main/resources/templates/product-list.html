<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* テーブルの細線を濃く */
        table, th, td {
            border: 1px solid #000 !important;
        }
        table {
            border-collapse: collapse !important;
        }
        th {
            background-color: #f7f7f7;
            font-weight: bold;
        }
    </style>
</head>

<body class="p-4">

    <h2 class="mb-3">商品一覧</h2>

    <!-- 検索フォーム -->
    <form th:action="@{/products}" method="get" class="mb-3 d-flex" style="max-width: 400px;">
        <input type="text" name="keyword" th:value="${keyword}"
               class="form-control me-2" placeholder="商品名で検索">
        <button type="submit" class="btn btn-primary">検索</button>
    </form>

    <!-- 新規登録ボタン -->
    <a href="/products/new" class="btn btn-success mb-3">＋ 新規商品登録</a>

    <!-- 商品一覧テーブル -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>商品名</th>
                <th>在庫</th>
                <th>原価</th>
                <th>売価</th>
                <th>操作</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.costPrice}"></td>
                <td th:text="${p.salePrice}"></td>

                <td>
                    <a th:href="@{'/products/edit/' + ${p.id}}" class="btn btn-sm btn-primary">編集</a>
                    <a th:href="@{'/products/delete/' + ${p.id}}" class="btn btn-sm btn-danger"
                       onclick="return confirm('削除してよろしいですか？');">削除</a>
                    <a th:href="@{'/products/in/' + ${p.id}}" class="btn btn-sm btn-success">入庫</a>
                    <a th:href="@{'/products/out/' + ${p.id}}" class="btn btn-sm btn-warning">出庫</a>

                </td>
            </tr>
        </tbody>
    </table>
    <a th:href="@{/history}" class="btn btn-success mb-3">入出庫履歴</a>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品一覧</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* テーブルの細線を濃く */
        table,
        th,
        td {
            border: 1px solid #000 !important;
        }

        table {
            border-collapse: collapse !important;
        }

        th {
            background-color: #f7f7f7;
            font-weight: bold;
        }
    </style>
</head>

<body class="p-4">

    <h2 class="mb-3">商品一覧</h2>

    <!-- 検索フォーム -->
    <form th:action="@{/product}" method="get" class="mb-3 d-flex" style="max-width: 400px;">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control me-2" placeholder="商品名で検索">
        <button type="submit" class="btn btn-primary">検索</button>
    </form>

    <!-- ボタン -->
    <div class="mb-3">
        <a href="/stock/list" class="btn btn-primary me-2">在庫一覧</a>
        <a href="/product/in" class="btn btn-primary me-2">入庫</a>
        <a href="/product/out-form" class="btn btn-danger me-2">出庫</a>
        <a href="/makers" class="btn btn-danger me-2">取引先一覧</a>
        <a href="/products/master" class="btn btn-danger me-2">商品マスタ一覧</a>
        <a href="/products/stock-chart" class="btn btn-info">在庫推移ページ</a>
        <a href="/price-change" class="btn btn-info">価格変更登録</a>
        <a href="/users/new" class="btn btn-info">ユーザー登録</a>
    </div>

    <div id="app">

        <!-- 商品一覧テーブル -->
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>取引先</th>
                    <th>商品名</th>
                    <th>在庫</th>
                    <th>単位</th>
                    <th>カテゴリ</th>
                    <th>操作</th>
                </tr>
            </thead>

            <tbody>
                <tr v-for="p in products" :key="p.id">
                    <td>{{ p.id }}</td>
                    <td>{{ p.makerName }}</td>
                    <td>{{ p.name }}</td>
                    <td>{{ p.stock }}</td>
                    <td>{{ p.unit }}</td>
                    <td>{{ p.category }}</td>
                    <td>
                        <button @click="deleteProduct(p.id)" class="btn btn-danger btn-sm">削除</button>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
    <a th:href="@{/history}" class="btn btn-success mb-3">入出庫履歴</a>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/product-list.js"></script>



</body>

</html>
